# Prod-раздача SPA + проксирование /api на backend.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip/brotli, кэш ассетов — добавим при проде.
    location /assets/ {
        expires 30d;
        access_log off;
    }

    # API → backend (имя сервиса из docker-compose).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA-фолбэк: любой путь → index.html (клиентский роутинг).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
